name: Growlightlog
options:
  bundleIdPrefix: com.shimondeitel.growlightlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Growlightlog:
    type: application
    platform: iOS
    sources:
      - path: Growlightlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.growlightlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Growlightlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GrowlightlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrowlightlogTests
      - path: Growlightlog.storekit
    dependencies:
      - target: Growlightlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.growlightlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GrowlightlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GrowlightlogUITests
    dependencies:
      - target: Growlightlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.growlightlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Growlightlog:
    build:
      targets:
        Growlightlog: all
        GrowlightlogTests: [test]
        GrowlightlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Growlightlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Growlightlog.storekit
      targets:
        - GrowlightlogTests
        - GrowlightlogUITests
    archive:
      config: Release
